    - title: Closing luxury ag loophole
      description: Montana’s property tax system currently provides broad access to agricultural classification with preferential tax treatment, meaning tax breaks intended for farmers and ranchers are commonly claimed by high-value homes and recreational properties. Some lawmakers have said they want to tighten those requirements.
